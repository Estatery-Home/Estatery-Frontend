openapi: 3.0.3
info:
  title: Estatery / Home Backend API
  version: 1.0.0
  description: 'REST API for the Estatery property rental platform: authentication
    (JWT), listings, bookings, payments, reviews, dashboards, promos, and public catalog
    endpoints.'
  contact:
    name: API Support
  license:
    name: Proprietary
paths:
  /api/admin/discounts/:
    get:
      operationId: admin_discounts_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Discounts
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromoCode'
          description: ''
    post:
      operationId: admin_discounts_create
      tags:
      - Discounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PromoCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromoCodeRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoCode'
          description: ''
  /api/admin/discounts/{id}/:

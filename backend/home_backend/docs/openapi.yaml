  /api/customer/properties/:
    get:
      operationId: customer_properties_list
      description: 'Customer-facing catalog: GET only (same data as public list, explicit
        route for the website app).'
      summary: List properties (customer)
      parameters:
      - in: query
        name: bathrooms
        schema:
          type: integer
      - in: query
        name: bedrooms
        schema:
          type: integer
      - in: query
        name: city
        schema:
          type: string
      - in: query
        name: country
        schema:
          type: string
      - in: query
        name: listing_type
        schema:
          type: string
          enum:
          - rent
          - sale
        description: |-
          Whether the property is for rent or for sale

          * `rent` - For Rent
          * `sale` - For Sale
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: property_type
        schema:
          type: string
          enum:
          - apartment
          - condo
          - house
          - studio
          - villa
        description: |-
          * `apartment` - Apartment
          * `house` - House
          * `condo` - Condo
          * `villa` - Villa
          * `studio` - Studio
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - available
          - maintenance
          - rented
        description: |-
          * `available` - Available
          * `rented` - Rented
          * `maintenance` - Under Maintenance
      tags:
      - Customer catalog
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Property'
          description: ''

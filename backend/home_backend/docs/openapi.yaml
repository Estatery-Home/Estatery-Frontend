          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPromoCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPromoCodeRequest'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoCode'
          description: ''
    delete:
      operationId: admin_discounts_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Discounts
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
